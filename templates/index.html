<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT Support Ticket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; width: 100%; max-width: 480px; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 4px; }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #2d3748; margin-top: 16px; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; transition: border 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }
    textarea { min-height: 100px; resize: vertical; }
    button { width: 100%; margin-top: 20px; padding: 12px; background: #3182ce; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:hover { background: #2b6cb0; }
    .error { background: #fed7d7; color: #c53030; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; }
    .footer a { color: #3182ce; text-decoration: none; }
    .badge { display: inline-block; background: #ebf8ff; color: #2b6cb0; font-size: 12px; padding: 2px 10px; border-radius: 12px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ICT Support Ticket</h1>
    <p class="subtitle">Government ICT Service Desk</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/submit" method="POST">
      <label>Your Name</label>
      <input type="text" name="name" placeholder="e.g. Fatou Sillah" required>

      <label>Phone Number</label>
      <input type="text" name="phone" placeholder="e.g. +220 555 1234" required>

      <label>Describe Your Issue</label>
      <textarea name="description" placeholder="e.g. My computer won't turn on, the screen is black..." required></textarea>

      <button type="submit">Submit Ticket</button>
    </form>

    <div class="footer">
      <a href="/status">Check existing ticket status</a>
    </div>
  </div>
</body>
</html>
