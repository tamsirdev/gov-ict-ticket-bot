<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a202c; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); padding: 32px; width: 100%; max-width: 400px; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 4px; }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
    input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }
    button { width: 100%; margin-top: 20px; padding: 12px; background: #2d3748; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1a202c; }
    .error { background: #fed7d7; color: #c53030; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #718096; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p class="subtitle">ICT Support Ticket Dashboard</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter admin password" required autofocus>
      <button type="submit">Login</button>
    </form>

    <a href="/" class="back">&larr; Back to ticket submission</a>
  </div>
</body>
</html>
