<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Tickets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; width: 100%; max-width: 560px; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 4px; }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 20px; }
    .ticket { border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .ticket-id { font-weight: 700; font-size: 16px; color: #3182ce; }
    .ticket-info { font-size: 13px; color: #718096; margin-top: 2px; }
    .ticket-right { text-align: right; }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-Open { background: #e6fffa; color: #234e52; }
    .status-In-Progress { background: #feebc8; color: #c05621; }
    .status-Resolved { background: #c6f6d5; color: #276749; }
    .status-Closed { background: #edf2f7; color: #2d3748; }
    .empty { text-align: center; padding: 40px 0; color: #a0aec0; }
    .empty p { font-size: 32px; margin-bottom: 8px; }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
    .actions a { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
    .btn-primary { background: #3182ce; color: white; }
    .btn-secondary { background: #edf2f7; color: #2d3748; }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-secondary:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Your Tickets</h1>
    <p class="subtitle">Phone: {{ phone }}</p>

    {% if tickets %}
      {% for t in tickets %}
        <div class="ticket">
          <div>
            <div class="ticket-id">#{{ t[0] }}</div>
            <div class="ticket-info">{{ t[2] }} &middot; {{ t[3] }}</div>
          </div>
          <div class="ticket-right">
            <span class="status-badge status-{{ t[1] }}">{{ t[1] }}</span>
          </div>
        </div>
      {% endfor %}
    {% else %}
      <div class="empty">
        <p>&#128269;</p>
        <p>No tickets found for this number.</p>
      </div>
    {% endif %}

    <div class="actions">
      <a href="/status" class="btn-secondary">Different Number</a>
      <a href="/" class="btn-primary">New Ticket</a>
    </div>
  </div>
</body>
</html>
