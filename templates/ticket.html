<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Created</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; width: 100%; max-width: 480px; text-align: center; }
    .check { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 24px; color: #1a202c; margin-bottom: 4px; }
    .id { font-size: 32px; font-weight: 700; color: #3182ce; margin: 12px 0; }
    .details { background: #f7fafc; border-radius: 8px; padding: 16px; margin: 16px 0; text-align: left; }
    .details div { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; }
    .details .label { color: #718096; }
    .details .value { font-weight: 600; color: #2d3748; }
    .tag { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }
    .tag-software { background: #ebf8ff; color: #2b6cb0; }
    .tag-hardware { background: #fefcbf; color: #975a16; }
    .tag-network { background: #e6fffa; color: #234e52; }
    .tag-account { background: #faf5ff; color: #553c9a; }
    .tag-general { background: #edf2f7; color: #2d3748; }
    .tag-Critical { background: #fed7d7; color: #c53030; }
    .tag-High { background: #feebc8; color: #c05621; }
    .tag-Medium { background: #e9d8fd; color: #553c9a; }
    .tag-Low { background: #c6f6d5; color: #276749; }
    a { display: inline-block; margin-top: 16px; color: #3182ce; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10004;&#65039;</div>
    <h1>Ticket Created!</h1>
    <div class="id">#{{ ticket_id }}</div>

    <div class="details">
      <div><span class="label">Category</span> <span class="tag tag-{{ category }}">{{ category }}</span></div>
      <div><span class="label">Priority</span> <span class="tag tag-{{ priority }}">{{ priority }}</span></div>
      <div><span class="label">Submitted by</span> <span class="value">{{ username }}</span></div>
    </div>

    <p style="color: #718096; font-size: 14px;">Our team has been notified. You can check your ticket status anytime.</p>

    <a href="/">Submit Another</a> &middot;
    <a href="/status">Check Status</a>
  </div>
</body>
</html>
